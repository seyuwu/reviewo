name: ${COMPOSE_PROJECT_NAME:-reviewo}

x-app-environment: &app-environment
  CI: ${CI:-true}
  NODE_ENV: ${NODE_ENV:-development}
  API_PORT: ${API_PORT:-3000}
  WEB_PORT: ${WEB_PORT:-3001}
  JWT_SECRET: ${JWT_SECRET:-reviewo_development_jwt_secret_change_me}
  JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-604800}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3001}
  TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-0}
  DATABASE_URL: postgresql://${POSTGRES_USER:-reviewo}:${POSTGRES_PASSWORD:-reviewo_password}@postgres:5432/${POSTGRES_DB:-reviewo}
  REDIS_URL: redis://redis:6379
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:-reviewo}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-reviewo_password}
  S3_BUCKET: ${S3_BUCKET:-reviewo}
  REPUTATION_ENGINE_ENABLED: ${REPUTATION_ENGINE_ENABLED:-false}
  GOOGLE_SHEETS_CLIENT_EMAIL: ${GOOGLE_SHEETS_CLIENT_EMAIL:-}
  GOOGLE_SHEETS_PRIVATE_KEY: ${GOOGLE_SHEETS_PRIVATE_KEY:-}
  GAMES_LAUNCH_SHEET_ID: ${GAMES_LAUNCH_SHEET_ID:-}
  WAITLIST_BOT_TOKEN: ${WAITLIST_BOT_TOKEN:-}
  WAITLIST_CHANNEL_URL: ${WAITLIST_CHANNEL_URL:-https://t.me/opinia_official}

x-app-common: &app-common
  init: true
  restart: unless-stopped
  networks:
    - reviewo
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_started
  environment:
    <<: *app-environment
  command: ["sh", "-c", "corepack pnpm check && sleep infinity"]

services:
  api:
    <<: *app-common
    image: reviewo-api:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: development
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    command: ["sh", "-c", "corepack pnpm --filter @reviewo/api dev"]

  web:
    <<: *app-common
    image: reviewo-web:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: development
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    command: ["sh", "-c", "corepack pnpm --filter @reviewo/web dev"]

  extension:
    <<: *app-common
    image: reviewo-extension:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/extension/Dockerfile
      target: development
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}

  waitlist-bot:
    image: reviewo-waitlist-bot:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/waitlist-bot/Dockerfile
    restart: unless-stopped
    profiles:
      - waitlist
    networks:
      - reviewo
    environment:
      WAITLIST_BOT_TOKEN: ${WAITLIST_BOT_TOKEN:-}
      WAITLIST_CHANNEL_URL: ${WAITLIST_CHANNEL_URL:-https://t.me/opinia_official}
      WAITLIST_SUPPORT_URL: ${WAITLIST_SUPPORT_URL:-https://t.me/opinia_support}
      WAITLIST_ADMIN_IDS: ${WAITLIST_ADMIN_IDS:-}
      WAITLIST_DATABASE_PATH: ${WAITLIST_DATABASE_PATH:-/data/waitlist.db}
    volumes:
      - waitlist_bot_data:/data

  welcome-flow-bot:
    image: reviewo-welcome-flow-bot:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/welcome-flow-bot/Dockerfile
    restart: unless-stopped
    profiles:
      - welcome-flow
    networks:
      - reviewo
    environment:
      WELCOME_FLOW_BOT_TOKEN: ${WELCOME_FLOW_BOT_TOKEN:-}
      WELCOME_FLOW_CHANNEL_URL: ${WELCOME_FLOW_CHANNEL_URL:-https://t.me/opiniagames}
      WELCOME_FLOW_ADMIN_IDS: ${WELCOME_FLOW_ADMIN_IDS:-}
      WELCOME_FLOW_DATABASE_PATH: ${WELCOME_FLOW_DATABASE_PATH:-/data/welcome_flow.db}
      WELCOME_FLOW_DELAY_MIN: ${WELCOME_FLOW_DELAY_MIN:-6}
      WELCOME_FLOW_DELAY_MAX: ${WELCOME_FLOW_DELAY_MAX:-18}
      WELCOME_FLOW_COOLDOWN_DAYS: ${WELCOME_FLOW_COOLDOWN_DAYS:-30}
      WELCOME_FLOW_HOURLY_CAP: ${WELCOME_FLOW_HOURLY_CAP:-40}
      WELCOME_FLOW_TEMPLATES_PATH: ${WELCOME_FLOW_TEMPLATES_PATH:-}
    volumes:
      - welcome_flow_bot_data:/data

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    networks:
      - reviewo
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reviewo}
      POSTGRES_USER: ${POSTGRES_USER:-reviewo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewo_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reviewo} -d ${POSTGRES_DB:-reviewo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    restart: unless-stopped
    networks:
      - reviewo
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    restart: unless-stopped
    networks:
      - reviewo
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-reviewo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-reviewo_password}
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
  waitlist_bot_data:
  welcome_flow_bot_data:

networks:
  reviewo:
    driver: bridge
