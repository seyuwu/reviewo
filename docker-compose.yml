name: ${COMPOSE_PROJECT_NAME:-reviewo}

x-app-environment: &app-environment
  CI: ${CI:-true}
  NODE_ENV: ${NODE_ENV:-development}
  API_PORT: ${API_PORT:-3000}
  WEB_PORT: ${WEB_PORT:-3001}
  DATABASE_URL: postgresql://${POSTGRES_USER:-reviewo}:${POSTGRES_PASSWORD:-reviewo_password}@postgres:5432/${POSTGRES_DB:-reviewo}
  REDIS_URL: redis://redis:6379
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:-reviewo}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-reviewo_password}
  S3_BUCKET: ${S3_BUCKET:-reviewo}

x-app-common: &app-common
  init: true
  restart: unless-stopped
  networks:
    - reviewo
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_started
  environment:
    <<: *app-environment
  command: ["sh", "-c", "corepack pnpm check && sleep infinity"]

services:
  api:
    <<: *app-common
    image: reviewo-api:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: development
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    ports:
      - "${API_PORT:-3000}:3000"
    command: ["sh", "-c", "corepack pnpm --filter @reviewo/api dev"]

  web:
    <<: *app-common
    image: reviewo-web:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: development
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    ports:
      - "${WEB_PORT:-3001}:3000"

  extension:
    <<: *app-common
    image: reviewo-extension:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: docker/extension/Dockerfile
      target: development
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    networks:
      - reviewo
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reviewo}
      POSTGRES_USER: ${POSTGRES_USER:-reviewo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewo_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reviewo} -d ${POSTGRES_DB:-reviewo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    restart: unless-stopped
    networks:
      - reviewo
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    restart: unless-stopped
    networks:
      - reviewo
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-reviewo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-reviewo_password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  reviewo:
    driver: bridge
