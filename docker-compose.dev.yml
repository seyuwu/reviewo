name: ${COMPOSE_PROJECT_NAME:-reviewo}

x-dev-workspace-volumes: &dev-workspace-volumes
  - type: bind
    source: .
    target: /workspace
  - type: volume
    source: dev_pnpm_store
    target: /pnpm/store
  - type: volume
    source: dev_root_node_modules
    target: /workspace/node_modules
  - type: volume
    source: dev_api_node_modules
    target: /workspace/apps/api/node_modules
  - type: volume
    source: dev_web_node_modules
    target: /workspace/apps/web/node_modules
  - type: volume
    source: dev_extension_node_modules
    target: /workspace/apps/extension/node_modules
  - type: volume
    source: dev_config_node_modules
    target: /workspace/packages/config/node_modules
  - type: volume
    source: dev_shared_node_modules
    target: /workspace/packages/shared/node_modules
  - type: volume
    source: dev_types_node_modules
    target: /workspace/packages/types/node_modules
  - type: volume
    source: dev_ui_node_modules
    target: /workspace/packages/ui/node_modules
  - type: volume
    source: dev_i18n_node_modules
    target: /workspace/packages/i18n/node_modules

x-dev-service-command: &dev-service-command
  [
    "sh",
    "-c",
    "LOCKFILE=/workspace/pnpm-lock.yaml; STAMP=/workspace/node_modules/.pnpm-install-stamp; if [ ! -f \"$$STAMP\" ] || [ \"$$LOCKFILE\" -nt \"$$STAMP\" ]; then echo dev-start: pnpm install; corepack pnpm install --frozen-lockfile --store-dir /pnpm/store && touch \"$$STAMP\"; else echo dev-start: skip install; fi; exec corepack pnpm --filter \"$$DEV_PNPM_FILTER\" dev"
  ]

services:
  api:
    build:
      target: development
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    environment:
      NODE_ENV: development
      DEV_PNPM_FILTER: "@reviewo/api"
      # Docker Desktop on Windows/macOS: bind mounts do not emit inotify events reliably.
      TSC_WATCH_POLL_INTERVAL_MS: "1000"
      # Dev sessions should stay logged in; do not inherit a short host JWT TTL (e.g. 900s).
      JWT_ACCESS_TOKEN_TTL_SECONDS: "10368000"
      # Keep API DB credentials aligned with postgres when the dev stack is recreated partially.
      DATABASE_URL: postgresql://${POSTGRES_USER:-reviewo}:${POSTGRES_PASSWORD:-reviewo_password}@postgres:5432/${POSTGRES_DB:-reviewo}
      REPUTATION_ENGINE_ENABLED: ${REPUTATION_ENGINE_ENABLED:-true}
    volumes: *dev-workspace-volumes
    command: *dev-service-command

  web:
    build:
      target: development
    ports:
      - "${WEB_PORT:-3001}:3000"
    environment:
      NODE_ENV: development
      DEV_PNPM_FILTER: "@reviewo/web"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
      CHOKIDAR_USEPOLLING: "true"
      API_INTERNAL_BASE_URL: http://api:${API_PORT:-3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3001}
      NEXT_PUBLIC_EXTENSION_INSTALL_URL: ${NEXT_PUBLIC_EXTENSION_INSTALL_URL:-}
    volumes: *dev-workspace-volumes
    command: *dev-service-command

  extension:
    build:
      target: development
    environment:
      NODE_ENV: development
      DEV_PNPM_FILTER: "@reviewo/extension"
    volumes: *dev-workspace-volumes
    command: *dev-service-command

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  waitlist-bot:
    volumes:
      - type: bind
        source: ./apps/waitlist-bot
        target: /app
      - type: volume
        source: waitlist_bot_data
        target: /data
    command: ["python", "-m", "bot"]

volumes:
  dev_pnpm_store:
  dev_root_node_modules:
  dev_api_node_modules:
  dev_web_node_modules:
  dev_extension_node_modules:
  dev_config_node_modules:
  dev_shared_node_modules:
  dev_types_node_modules:
  dev_ui_node_modules:
  dev_i18n_node_modules:
