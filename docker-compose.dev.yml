services:
  api:
    build:
      target: development
    environment:
      NODE_ENV: development
    command: ["sh", "-c", "corepack pnpm --filter @reviewo/api dev"]

  web:
    build:
      target: development
    environment:
      NODE_ENV: development
    command: ["sh", "-c", "corepack pnpm check && sleep infinity"]

  extension:
    build:
      target: development
    environment:
      NODE_ENV: development
    command: ["sh", "-c", "corepack pnpm check && sleep infinity"]
