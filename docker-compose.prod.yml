services:
  api:
    build:
      target: production
    environment:
      NODE_ENV: production
    restart: always
    command:
      ["sh", "-c", "corepack pnpm --filter @reviewo/api start:prod"]

  web:
    build:
      target: production
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
    environment:
      NODE_ENV: production
    restart: always
    command: ["sh", "-c", "corepack pnpm --filter @reviewo/web start"]

  extension:
    build:
      target: production
    environment:
      NODE_ENV: production
    restart: "no"
    profiles:
      - extension-artifacts
    command: ["sh", "-c", "corepack pnpm --filter @reviewo/extension build"]

  postgres:
    restart: always

  redis:
    restart: always

  minio:
    restart: always
