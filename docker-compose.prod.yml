services:
  api:
    build:
      target: production
    environment:
      NODE_ENV: production
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-reviewo}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-reviewo}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-0}
    restart: always
    command:
      ["sh", "-c", "corepack pnpm --filter @reviewo/api start:prod"]

  web:
    build:
      target: production
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL is required}
    environment:
      API_INTERNAL_BASE_URL: http://api:${API_PORT:-3000}
      NODE_ENV: production
    restart: always
    command: ["sh", "-c", "corepack pnpm --filter @reviewo/web start"]

  extension:
    build:
      target: production
    environment:
      NODE_ENV: production
    restart: "no"
    profiles:
      - extension-artifacts
    command: ["sh", "-c", "corepack pnpm --filter @reviewo/extension build"]

  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reviewo}
      POSTGRES_USER: ${POSTGRES_USER:-reviewo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    restart: always

  redis:
    restart: always

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    restart: always
